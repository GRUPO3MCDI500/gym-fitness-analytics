name: CI - Validacion Fase 1

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  validar-proyecto:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verificar estructura del repositorio
        run: |
          test -f README.md
          test -f requirements.txt
          test -f data/raw/clean_gym_data.csv
          test -f notebooks/F1_Definicion.ipynb
          test -d data
          test -d notebooks
          test -d docs
          test -d reports

      - name: Verificar carga del dataset
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          data_path = Path("data/raw/clean_gym_data.csv")

          if not data_path.exists():
              raise FileNotFoundError("No se encontro el dataset en data/raw/clean_gym_data.csv")

          df = pd.read_csv(data_path)

          print("Dataset cargado correctamente")
          print("Filas:", df.shape[0])
          print("Columnas:", df.shape[1])

          if df.shape[0] == 0:
              raise ValueError("El dataset no contiene filas")

          if df.shape[1] == 0:
              raise ValueError("El dataset no contiene columnas")
          PY

      - name: Verificar columnas principales
        run: |
          python - <<'PY'
          import pandas as pd
          from pathlib import Path

          df = pd.read_csv(Path("data/raw/clean_gym_data.csv"))

          columnas_esperadas = [
              "country",
              "region",
              "year",
              "gym_memberships",
              "fitness_participation_rate",
              "total_health_club_revenue_usd",
              "number_of_gyms",
              "gym_penetration_rate",
              "urban_population_percentage",
              "obesity_rate",
              "gdp_per_capita_usd",
              "population_total",
              "average_membership_cost_usd",
              "insufficient_physical_activity_pct"
          ]

          faltantes = [col for col in columnas_esperadas if col not in df.columns]

          if faltantes:
              raise ValueError(f"Faltan columnas esperadas: {faltantes}")

          print("Todas las columnas principales estan presentes")
          PY
