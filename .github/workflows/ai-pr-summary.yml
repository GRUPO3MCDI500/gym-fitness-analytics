name: AI - Resumen de Pull Request

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write
  issues: write
  models: read

jobs:
  resumen-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Obtener archivos modificados
        run: |
          echo "Archivos modificados en el Pull Request:"
          git diff --name-only origin/main...HEAD | tee cambios.txt

      - name: Crear contexto para el modelo
        id: contexto
        run: |
          {
            echo "Proyecto: gym-fitness-analytics"
            echo ""
            echo "Objetivo del proyecto:"
            echo "Analizar la evolucion global de la industria fitness y gimnasios entre 2000 y 2026 mediante un flujo reproducible con Python, Jupyter Notebook, GitHub y GitHub Actions."
            echo ""
            echo "Archivos modificados en este Pull Request:"
            cat cambios.txt
            echo ""
            echo "Estructura esperada del proyecto:"
            echo "- README.md"
            echo "- requirements.txt"
            echo "- data/raw/clean_gym_data.csv"
            echo "- notebooks/F1_Definicion.ipynb"
            echo "- .github/workflows/main.yml"
            echo "- .github/workflows/ai-pr-summary.yml"
            echo "- docs/"
            echo "- reports/fase1/"
            echo ""
            echo "Ramas utilizadas en el proyecto:"
            echo "- main"
            echo "- feature/actualizar-notebook-f1"
            echo "- feature/actualizar-readme"
            echo "- feature/documentacion-fase1"
            echo "- feature/ci-cd"
            echo "- feature/dataset-validacion"
            echo ""
            echo "Indica si los cambios afectan documentacion, notebook, dataset, CI/CD, ramas o evidencias de Fase 1."
          } > contexto_pr.txt

          {
            echo "text<<EOF"
            cat contexto_pr.txt
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generar resumen con GitHub Models
        id: ai
        uses: actions/ai-inference@v1
        with:
          model: openai/gpt-4o-mini
          prompt: |
            Eres un asistente tecnico para un proyecto de ciencia de datos reproducible.

            Analiza el siguiente contexto de un Pull Request y genera un resumen breve en espanol.

            Debes responder con este formato exacto:

            ## Resumen automatico del Pull Request

            **Tipo de cambio:** documentacion / notebook / dataset / ci-cd / ramas / evidencias / mixto

            **Archivos modificados:**
            - Lista breve de archivos afectados.

            **Impacto tecnico:**
            Explica en 2 o 3 lineas que cambia y si afecta la reproducibilidad del proyecto.

            **Validaciones recomendadas:**
            - Revisar que GitHub Actions pase correctamente.
            - Ejecutar el notebook si se modifico `F1_Definicion.ipynb`.
            - Revisar README si se modifico la documentacion.
            - Verificar dataset si se modifico `data/raw/clean_gym_data.csv`.
            - Revisar workflow si se modifico `.github/workflows/`.

            **Observacion final:**
            Indica si el Pull Request parece seguro para fusionarse a `main`, siempre que las validaciones pasen.

            Contexto:
            ${{ steps.contexto.outputs.text }}

      - name: Guardar resumen en archivo
        run: |
          cat > resumen_ai.md <<'EOF'
          ${{ steps.ai.outputs.response }}
          EOF

      - name: Comentar resumen en Pull Request
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('resumen_ai.md', 'utf8');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
